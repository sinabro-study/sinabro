services:
  mysql:
    image: mysql:latest
    container_name: mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: sinabro
      MYSQL_USER: sinabro
      MYSQL_PASSWORD: 1234
  redis:
    image: redis:7.2.12
    container_name: redis
    ports:
      - "6379:6379"